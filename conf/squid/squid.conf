# Bootstrap config for ProxyHub external HTTP engine (Squid).
# Phase 1 scope: provide a runnable default config. ACL/auth mapping will be wired in later phases.

http_port 0.0.0.0:8080

# Keep policy explicit even for bootstrap configuration.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Temporary allow-all source rule for bootstrap validation.
# This must be replaced by ProxyHub-generated ACL rules in later phases.
acl all_clients src all
http_access allow all_clients
http_access deny all

cache deny all
via off
forwarded_for delete

# Keep logs in project-local directory so ProxyHub can ingest later.
access_log stdio:./logs/squid/access.log
cache_log ./logs/squid/cache.log
pid_filename ./logs/squid/squid.pid
